version: '3.8'

services:

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: comments-db
    environment:
      SA_PASSWORD: "YourStrong!Passw0rd"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    healthcheck:
      test: |
        /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "YourStrong!Passw0rd" -Q "SELECT 1" || exit 1
      interval: 10s
      retries: 10
    volumes:
      - db-data:/var/opt/mssql

  db-init:
    image: mcr.microsoft.com/mssql-tools
    depends_on:
      - db
    volumes:
      - ./db-init:/scripts
    entrypoint: [ "bash", "-c", "
      echo 'Waiting for SQL Server...';
      for i in {1..60}; do
        /opt/mssql-tools/bin/sqlcmd -S db -U sa -P 'YourStrong!Passw0rd' -Q 'SELECT 1' && break || sleep 1;
      done;
      echo 'Running init.sql';
      /opt/mssql-tools/bin/sqlcmd -S db -U sa -P 'YourStrong!Passw0rd' -i /scripts/init.sql;
      echo 'Init finished';
      "]
    # запускаем один раз и завершаем
    restart: 'no'

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    ports:
      - "5000:8080"
    depends_on:
      - db
      - db-init
    environment:
      ConnectionStrings__DefaultConnection: "Server=db;Database=CommentsDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=true;"

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  db-data: