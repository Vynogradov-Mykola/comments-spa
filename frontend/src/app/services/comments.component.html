<div class="comment-form">

  <h3>Add comment</h3>

  <input [(ngModel)]="userName" placeholder="User name" />
  <input [(ngModel)]="email" placeholder="Email" />
  <input [(ngModel)]="homePage" placeholder="Home page (optional)" />
  <input type="file" (change)="onFileSelected($event)" accept=".txt,image/png,image/jpeg,image/gif" />

  <!-- Preview изображения -->
  <div *ngIf="previewImage" class="preview-image">
    <img [src]="previewImage" alt="Preview" />
  </div>

  <!-- Preview текстового файла -->
  <div *ngIf="previewText" class="preview-text">
    <pre>{{ previewText }}</pre>
  </div>

  <textarea [(ngModel)]="text" placeholder="Write a comment..."></textarea>

  <div class="captcha">
    <img
      [src]="captchaImage"
      (click)="loadCaptcha()"
      style="cursor:pointer"
      title="Click to refresh captcha"
    />
    <input
      [(ngModel)]="captchaCode"
      placeholder="Enter CAPTCHA"
    />
  </div>

  <div class="form-actions">
    <button (click)="send()">Send (as new)</button>
    <button *ngIf="replyToParentId" (click)="send()">Send reply</button>
    <button *ngIf="replyToParentId" (click)="cancelReply()">Cancel reply</button>
  </div>

  <div *ngIf="replyToParentId" class="replying-to">
    Replying to: <b>{{ replyToUserName }}</b>
  </div>

</div>

<h3>Comments</h3>

<div class="comments-container">

  <ng-container *ngFor="let root of commentsTree">
    <ng-container
      *ngTemplateOutlet="commentTpl; context: { $implicit: root, level: 0 }">
    </ng-container>
  </ng-container>

</div>

<ng-template #commentTpl let-comment let-level="level">

  <div class="comment" [style.marginLeft.px]="level * 18">

    <div class="meta">
      <b class="username">{{ comment.userName ?? comment.UserName }}</b>
      <span class="email">{{ comment.email ?? comment.Email }}</span>
      <span class="date">
        {{ comment.createdAt || comment.CreatedAt | date:'short' }}
      </span>
    </div>

    <div class="body">

      <p [innerHTML]="comment.commentText ?? comment.CommentText"></p>

      <!-- FILE -->
      <div *ngIf="comment.fileBase64" class="comment-file">

        <!-- IMAGE -->
        <div *ngIf="isImage(comment.fileName)" class="comment-image">

          <img
            [src]="getFileDataUrl(comment)"
            class="comment-preview"
            (click)="openImage(comment)"
          />

        </div>

        <!-- TEXT -->
        <div *ngIf="isText(comment.fileName)" class="comment-textfile">

          <div
            class="text-preview"
            (click)="openText(comment)"
          >
            Click to open TXT
          </div>

        </div>

      </div>

      <div class="comment-actions">
        <button (click)="reply(comment)">Reply</button>
        <button (click)="send(comment.id)">Reply & send immediately</button>
      </div>

    </div>

    <div *ngIf="comment.children?.length">
      <ng-container *ngFor="let ch of comment.children">
        <ng-container
          *ngTemplateOutlet="commentTpl; context: { $implicit: ch, level: level + 1 }">
        </ng-container>
      </ng-container>
    </div>

  </div>

</ng-template>


<!-- FILE VIEWER -->

<div class="file-viewer" *ngIf="viewerOpen" (click)="closeViewer()">

  <div class="viewer-content" (click)="$event.stopPropagation()">

    <button class="viewer-close" (click)="closeViewer()">✕</button>

    <!-- IMAGE -->
    <img
      *ngIf="viewerType === 'image'"
      [src]="viewerContent"
      class="viewer-image"
    />

    <!-- TEXT -->
    <pre
      *ngIf="viewerType === 'text'"
      class="viewer-text"
    >
{{ viewerContent }}
    </pre>

  </div>

</div>
